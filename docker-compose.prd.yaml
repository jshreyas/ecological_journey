services:
  ui:
    image: ghcr.io/jshreyas/ecological-journey-ui:latest
    container_name: ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    dns:
      - 8.8.8.8
    tty: true
    stdin_open: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ecological-network

networks:
  ecological-network:
    driver: bridge
